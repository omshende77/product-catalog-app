<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Product Catalog Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <span class="navbar-brand"> Product Catalog Dashboard </span>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card shadow">
            <div class="card-body text-center">
              <h5>Total Products</h5>

              <h2 id="product-count">--</h2>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card shadow">
            <div class="card-body text-center">
              <h5>Total Categories</h5>

              <h2 id="category-count">--</h2>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card shadow">
            <div class="card-body text-center">
              <h5>API Status</h5>

              <h2 class="text-success">Active</h2>
            </div>
          </div>
        </div>
      </div>
      <div class="card shadow mt-5">
        <div class="card-header">Create Product</div>

        <div class="card-body">
          <form id="product-form">
            <div class="mb-3">
              <input
                type="text"
                id="product-name"
                class="form-control"
                placeholder="Product Name"
                required
              />
            </div>

            <div class="mb-3">
              <textarea
                id="product-description"
                class="form-control"
                placeholder="Description"
                required
              ></textarea>
            </div>

            <div class="mb-3">
              <input
                type="number"
                id="product-price"
                class="form-control"
                placeholder="Price"
                required
              />
            </div>

            <div class="mb-3">
              <select id="product-category" class="form-select" required>
                <option value="">Select Category</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary">
              Create Product
            </button>
          </form>
        </div>
      </div>
      <div class="card shadow mt-5">
        <div class="card-header">Latest Products</div>

        <div class="card-body">
          <div class="mb-3">
            <input
              type="text"
              id="search-input"
              class="form-control"
              placeholder="Search products..."
            />
          </div>

          <div id="product-list"></div>
          <div
            id="pagination-controls"
            class="d-flex justify-content-between mt-3"
          ></div>
        </div>
      </div>
    </div>
    <script>
      let currentPage = 1;

      let nextPageUrl = null;

      let previousPageUrl = null;
      const loadCategories = async () => {
        try {
          const response = await fetch("/api/categories/");

          const data = await response.json();

          const categorySelect = document.getElementById("product-category");

          data.forEach((category) => {
            categorySelect.innerHTML += `
                <option value="${category.id}">
                    ${category.name}
                </option>
            `;
          });
        } catch (error) {
          console.error("Category Error:", error);
        }
      };
      const productForm = document.getElementById("product-form");

      productForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        try {
          const productData = {
            category: document.getElementById("product-category").value,

            name: document.getElementById("product-name").value,

            description: document.getElementById("product-description").value,

            price: document.getElementById("product-price").value,
          };

          const response = await fetch("/api/products/", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify(productData),
          });

          const data = await response.json();

          console.log(data);
          loadProducts();

          loadStats();

          productForm.reset();

          alert("Product Created Successfully!");
        } catch (error) {
          console.error(error);
        }
      });
      const loadProducts = async (search = "", page = 1) => {
        try {
          const response = await fetch(
            `/api/products/?page=${page}&search=${search}`,
          );

          const data = await response.json();
          currentPage = page;

          nextPageUrl = data.next;

          previousPageUrl = data.previous;

          const products = data.results;

          const productList = document.getElementById("product-list");

          productList.innerHTML = "";

          products.forEach((product) => {
            productList.innerHTML += `
                <div class="border rounded p-3 mb-3">

                    <h5>${product.name}</h5>

                    <p>
                        ${product.description}
                    </p>

                    <strong>
                        ₹${product.price}
                    </strong>

                </div>
            `;
          });
          const paginationControls = document.getElementById(
            "pagination-controls",
          );

          paginationControls.innerHTML = `
    <button
        class="btn btn-secondary"
        ${!previousPageUrl ? "disabled" : ""}
        onclick="changePage(-1)"
    >
        Previous
    </button>

    <span class="align-self-center">
        Page ${currentPage}
    </span>

    <button
        class="btn btn-secondary"
        ${!nextPageUrl ? "disabled" : ""}
        onclick="changePage(1)"
    >
        Next
    </button>
`;
        } catch (error) {
          console.error(error);
        }
      };

      const loadStats = async () => {
        try {
          const productResponse = await fetch("/api/products/");

          const productData = await productResponse.json();

          const categoryResponse = await fetch("/api/categories/");

          const categoryData = await categoryResponse.json();

          document.getElementById("product-count").textContent =
            productData.count;

          document.getElementById("category-count").textContent =
            categoryData.length;
        } catch (error) {
          console.error("Statistics Error:", error);
        }
      };

      const searchInput = document.getElementById("search-input");

      searchInput.addEventListener("input", (event) => {
        loadProducts(event.target.value);
      });

      loadCategories();
      loadProducts();
      const changePage = (direction) => {
        loadProducts(
          document.getElementById("search-input").value,

          currentPage + direction,
        );
      };
      loadStats();
    </script>
  </body>
</html>
