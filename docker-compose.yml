services:
  postgres:
    image: postgres:17
    container_name: postgres-db

    env_file:
      - .env

    ports:
      - "5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./productcatlogapp

    container_name: backend

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - postgres

  frontend:
    build:
      context: ./product-catalog-react

    container_name: frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data:
